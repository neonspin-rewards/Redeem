<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>NeonSpin — Lucky Box</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .game-page-wrap{padding:20px 16px 100px;max-width:480px;margin:0 auto}
    .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--clr-muted);font-size:13px;font-weight:600;text-decoration:none;margin-bottom:20px;padding:8px 12px;background:rgba(255,255,255,.05);border-radius:20px;border:1px solid rgba(255,255,255,.08);transition:all .2s}
    .back-link:hover{color:var(--clr-accent);border-color:rgba(0,212,255,.3);text-decoration:none}
    .game-title-row{text-align:center;margin-bottom:24px}
    .game-title-row h1{font-family:var(--font-display);font-size:22px;font-weight:900;background:linear-gradient(135deg,#39ff14,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .game-title-row p{color:var(--clr-muted);font-size:13px;margin-top:4px}
    .lucky-card{background:var(--clr-card);border:1px solid rgba(57,255,20,.2);border-radius:var(--r-lg);padding:28px 20px;box-shadow:0 0 30px rgba(57,255,20,.08)}
    .boxes-row{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:28px}
    .lucky-box{width:88px;height:88px;border-radius:var(--r-md);background:linear-gradient(135deg,rgba(57,255,20,.12),rgba(0,212,255,.12));border:2px solid rgba(57,255,20,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:transform .2s,box-shadow .2s,background .2s;touch-action:manipulation;user-select:none;position:relative;overflow:hidden}
    .lucky-box:hover:not(.picked):not(.disabled){transform:translateY(-6px) scale(1.05);box-shadow:0 8px 30px rgba(57,255,20,.3);border-color:rgba(57,255,20,.7)}
    .lucky-box:active:not(.picked):not(.disabled){transform:scale(.94)}
    .lucky-box.disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
    .lucky-box.picked{border-color:var(--clr-gold);background:linear-gradient(135deg,rgba(251,191,36,.25),rgba(255,107,53,.15));box-shadow:0 0 30px rgba(251,191,36,.3);cursor:default;animation:boxPick .4s cubic-bezier(.34,1.56,.64,1)}
    .box-icon{font-size:30px;pointer-events:none}
    .box-label{font-size:10px;font-weight:700;color:var(--clr-muted);font-family:var(--font-display);letter-spacing:.05em;pointer-events:none}
    .box-reveal{font-family:var(--font-display);font-size:15px;font-weight:900;color:var(--clr-gold);pointer-events:none;animation:fadeUp .3s ease}
    .lucky-instruction{text-align:center;font-size:14px;color:var(--clr-muted);margin-bottom:4px}
    .lucky-round{text-align:center;font-size:13px;color:var(--clr-accent);font-weight:700;margin-bottom:20px;min-height:18px}
    .result-panel{text-align:center;padding:16px;animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
    .result-big{font-family:var(--font-display);font-size:44px;font-weight:900;color:var(--clr-gold)}
    .result-sub{font-size:14px;color:var(--clr-muted);margin:4px 0 6px}
    .result-unlock{font-size:12px;color:var(--clr-green);margin-bottom:20px}
    .btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border-radius:24px;font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:.06em;border:none;background:linear-gradient(135deg,var(--clr-accent),var(--clr-accent2));color:#fff;cursor:pointer;transition:opacity .15s,transform .15s;width:100%}
    .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
    .hidden{display:none!important}
    @keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
    @keyframes boxPick{0%{transform:scale(.85)}60%{transform:scale(1.12)}100%{transform:scale(1)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <header id="site-header">
    <div class="header-inner">
      <div class="logo"><span class="logo-icon">⚡</span><span class="logo-text">NeonSpin</span></div>
      <div class="header-right" style="font-size:13px;color:var(--clr-muted)">Game 4 of 8</div>
    </div>
  </header>

  <main id="app">
    <div class="game-page-wrap">
      <a href="games.html" class="back-link">← Back to Games</a>
      <div class="game-title-row">
        <h1>📦 Lucky Box</h1>
        <p>Pick a box — 3 rounds, accumulate your coins!</p>
      </div>

      <div class="lucky-card">
        <div id="game-area">
          <p class="lucky-instruction" id="instruction">Choose a mystery box!</p>
          <p class="lucky-round" id="round-label">Round 1 of 3</p>
          <div class="boxes-row" id="boxes-row"></div>
        </div>

        <div id="result-panel" class="result-panel hidden">
          <div style="font-size:52px;margin-bottom:12px">🎁</div>
          <div class="result-big" id="result-big">+0</div>
          <div class="result-sub">Total Coins Earned!</div>
          <button class="btn-primary" id="play-again-btn">🔄 Play Again</button>
          <a href="games.html" style="display:block;text-align:center;margin-top:12px;color:var(--clr-muted);font-size:13px;">← Back to Hub</a>
        </div>
      </div>
    </div>
  </main>

  <nav id="bottom-nav">
    <a href="index.html" class="nav-btn"><span class="nav-icon">🏠</span><span class="nav-label">Home</span><span class="nav-indicator"></span></a>
    <a href="games.html" class="nav-btn active"><span class="nav-icon">🎮</span><span class="nav-label">Games</span><span class="nav-indicator"></span></a>
    <a href="leaderboard.html" class="nav-btn"><span class="nav-icon">🏆</span><span class="nav-label">Ranks</span><span class="nav-indicator"></span></a>
    <a href="redeem.html" class="nav-btn"><span class="nav-icon">🎁</span><span class="nav-label">Rewards</span><span class="nav-indicator"></span></a>
    <a href="profile.html" class="nav-btn"><span class="nav-icon">👤</span><span class="nav-label">Profile</span><span class="nav-indicator"></span></a>
  </nav>

  <script>
  (() => {
    const GAME_ID = 4;
    const BOX_ICONS = ['📦','🎁','🎀','💝','🧧'];
    const REWARDS = [5, 10, 15, 20, 25, 30, 40, 50, 75, 100];

    let round = 1, totalCoins = 0, picking = false;

    function startGame() {
      round = 1; totalCoins = 0; picking = false;
      document.getElementById('result-panel').classList.add('hidden');
      document.getElementById('game-area').style.display = '';
      showRound();
    }

    function showRound() {
      document.getElementById('round-label').textContent = `Round ${round} of 3`;
      document.getElementById('instruction').textContent = 'Choose a mystery box!';
      picking = false;

      // Generate random rewards for 5 boxes
      const prizes = REWARDS.sort(() => Math.random() - .5).slice(0, 5);

      const row = document.getElementById('boxes-row');
      row.innerHTML = '';
      prizes.forEach((coins, i) => {
        const box = document.createElement('div');
        box.className = 'lucky-box';
        box.innerHTML = `<span class="box-icon">${BOX_ICONS[i]}</span><span class="box-label">BOX ${i+1}</span>`;
        box.dataset.coins = coins;
        box.addEventListener('click', () => pickBox(box, coins));
        box.addEventListener('touchend', e => { e.preventDefault(); pickBox(box, coins); }, {passive:false});
        row.appendChild(box);
      });
    }

    function pickBox(box, coins) {
      if (picking || box.classList.contains('picked') || box.classList.contains('disabled')) return;
      picking = true;

      // Disable all boxes
      row.querySelectorAll('.lucky-box').forEach(b => b.classList.add('disabled'));

      box.classList.remove('disabled');
      box.classList.add('picked');
      box.innerHTML = `<span class="box-reveal">+${coins}</span><span class="box-icon">🌟</span>`;
      totalCoins += coins;

      document.getElementById('instruction').textContent = `+${coins} coins! Total: ${totalCoins}`;

      setTimeout(() => {
        round++;
        if (round > 3) {
          endGame();
        } else {
          showRound();
        }
      }, 1100);
    }

    const row = document.getElementById('boxes-row');

    function endGame() {
      document.getElementById('game-area').style.display = 'none';
      document.getElementById('result-big').textContent = '+' + totalCoins;

      // ── HYBRID SYNC: award coins to localStorage + Firebase ──
      window.__ns_giveReward?.('coins', totalCoins, '📦', 'Lucky Box!');

      document.getElementById('result-panel').classList.remove('hidden');
    }

    document.getElementById('play-again-btn').addEventListener('click', startGame);
    startGame();
    if (localStorage.getItem('ns_theme') === 'light') document.body.classList.add('light-theme');
  })();
  </script>
  <script type="module" src="game-bridge.js"></script>
</body>
</html>
